<!--
  index.html -- Single-page React application for the Roost camera viewer.

  This file is both the HTML shell and the entire frontend application. There
  is no build step, no bundler, and no separate JavaScript files. React and
  Babel are loaded from a CDN (unpkg) at runtime, and Babel transpiles the
  JSX in the <script type="text/babel"> block directly in the browser. This
  keeps the setup to zero local tooling: the Flask backend serves this one
  file and everything works.

  The app has two main sections rendered side by side:

    Camera tile (left):
        Shows a live/paused status indicator and lets you send control
        commands to the camera capture app over WebSocket. Commands include:
        single snapshot, multi-snapshot burst, start stream, stop stream.
        Each command outcome is logged to a small activity feed.

    Gallery (right):
        Fetches the most recent photos from the Flask backend (/api/photos),
        which in turn lists S3 and returns presigned URLs. Polls every 10
        seconds in normal mode. Also supports tag search: type a label like
        "dog" or "package" and the backend queries the DynamoDB tag index
        that the vision Lambda populates. Clicking any photo opens a
        lightbox with the full image, Claude's description, and all detected
        tags.

  WebSocket connections:
        The app opens TWO WebSocket connections to the camera Pi:
          ws://<host>:8080  -- camera control (snapshot, multi-snapshot,
                               resolution change, shutdown)
          ws://<host>:8081  -- stream control (start/stop the MJPG stream)
        These connect directly from the browser to the Pi. They do NOT route
        through the Flask backend because they carry no AWS credentials and
        involve no secrets. The configured hostname is saved in localStorage
        so it persists across page reloads.

  Data flow for photos:
        Browser -> GET /api/photos -> Flask -> S3 list + presign -> Browser
        Browser then loads image bytes directly from the S3 presigned URL,
        not through Flask.

  Data flow for tag search:
        Browser -> GET /api/search?tag=X -> Flask -> DynamoDB GSI query
        -> S3 presign for each result -> Browser
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<!--
  viewport meta tag: without this, mobile browsers shrink the full desktop
  layout to fit a narrow screen and the user must pinch-zoom to read anything.
  width=device-width tells the browser to use the actual device width as the
  layout viewport. initial-scale=1 disables the automatic zoom-out.
-->
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>roost</title>

<!--
  Google Fonts: three typefaces chosen for different roles.

    Space Grotesk (weights 500, 600, 700):
        Used only for the "roost" brand name in the top bar. A geometric
        sans-serif with slightly quirky letterforms; distinctive at small
        sizes without being noisy.

    Inter (weights 400, 500, 600):
        The body typeface for almost all text in the app. Designed explicitly
        for screen readability at small sizes. The three weights cover every
        visual weight used here: regular body copy, medium labels, and
        semibold headings.

    JetBrains Mono (weights 400, 500):
        Used for timestamps, S3 keys, hostname inputs, tag chip labels, and
        any other technical/machine-readable value. Monospace keeps these
        values visually distinct from prose and makes character-by-character
        scanning easier.

  The two "preconnect" link tags that come before the stylesheet tell the
  browser to establish the TCP and TLS connections to fonts.googleapis.com
  and fonts.gstatic.com early, before the actual font request fires. This
  reduces the time fonts spend blocking rendering.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/*
  CSS custom properties (design tokens) defined on :root so they cascade
  to every element in the document. Centralizing colors and geometry here
  means the whole theme can be changed in one place, and component styles
  reference semantic names ("accent", "panel-border") rather than raw hex
  values scattered across dozens of rules.
*/
:root {
  --bg: #0a0e14;                           /* Page background: near-black with a blue undertone */
  --panel: rgba(255,255,255,0.035);        /* Card fill: barely-visible white, frosted-glass effect */
  --panel-border: rgba(255,255,255,0.08); /* Default card border: subtle white outline */
  --panel-border-strong: rgba(255,255,255,0.14); /* Stronger border for hover/active states */
  --text: #e8eaf0;                         /* Primary text: slightly blue-tinted off-white */
  --text-muted: #8a92a6;                   /* Secondary text: medium gray for labels and subtitles */
  --text-faint: #565d70;                   /* Tertiary text: dark gray for timestamps and placeholders */
  --accent: #5b8cff;                       /* Brand blue: links, focus rings, the brand dot, active borders */
  --accent-soft: rgba(91,140,255,0.16);   /* Translucent blue: tag chip backgrounds, glow halos */
  --live: #ff5c5c;                         /* Red: LIVE state indicator, Stop button, pulse rings */
  --live-soft: rgba(255,92,92,0.18);      /* Translucent red: live state backgrounds and glows */
  --ok: #34d399;                           /* Green: "connected" status dot */
  --ok-soft: rgba(52,211,153,0.16);       /* Translucent green: connected state glow halo */
  --radius: 16px;                          /* Large corner radius: panel/card outer corners */
  --radius-sm: 10px;                       /* Small corner radius: buttons, photo cards, inner elements */
}

/*
  Universal box-sizing reset. The browser default calculates element width as
  content-width only, and padding + border add on top of that. With border-box,
  width includes padding and border, making layout math straightforward:
  "width: 100%" fills the container without overflow regardless of padding.
*/
* { box-sizing: border-box; }

/*
  Root body styles. The background uses a layered value:
    1. A radial gradient: a soft blue elliptical glow positioned above the top
       center of the page (50% horizontal, -10% vertical -- off-screen top).
       This creates the impression of a light source behind the content without
       being distracting.
    2. The flat dark background color underneath the gradient.
  min-height: 100vh ensures the background fills the full viewport even when
  the content is short.
*/
body {
  margin: 0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(91,140,255,0.10), transparent),
              var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif; /* Inter primary; system-ui fallback before fonts load */
  min-height: 100vh;
}

/*
  Utility classes for font-family overrides. Applied inline to individual
  elements that need a different typeface from the Inter body default.
*/
.mono { font-family: 'JetBrains Mono', monospace; } /* timestamps, keys, host names */
.display { font-family: 'Space Grotesk', sans-serif; } /* brand name in the header */

/*
  Force buttons and links to inherit the body font. Some browsers apply a
  different system font to form elements by default, which would break the
  consistent Inter baseline.
*/
a, button { font-family: inherit; }

/*
  Main application container. max-width prevents the layout from stretching
  uncomfortably wide on large monitors. margin: 0 auto centers it horizontally.
  The bottom padding (64px) gives breathing room below the last element so
  content does not butt against the very bottom of the window.
*/
.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 22px 24px 64px;
}

/* ---- Top bar ---- */

/*
  The top bar spans the full width of the app container. It holds the brand
  group on the left and the status pills on the right. flex-wrap: wrap allows
  the pills to drop to a second line on very narrow screens rather than
  overflowing the container.
*/
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

/*
  Brand group: the accent dot and the "roost" wordmark, side by side,
  vertically centered.
*/
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

/*
  Small filled circle that acts as a logo mark beside the brand name.
  The box-shadow uses spread-only (no blur, no offset) to create a solid
  glow ring around the dot in the translucent accent color.
*/
.brand-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}

/*
  Brand name text. Kept small (17px) so it reads as a label rather than a
  page title. The Space Grotesk display font makes it distinctive despite the
  small size. letter-spacing: -0.01em slightly tightens the kerning, which
  looks better at small sizes in Space Grotesk.
*/
.brand h1 {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}

/*
  Container for the row of status pills on the right side of the top bar.
*/
.pills {
  display: flex;
  gap: 8px;
}

/*
  Individual status pill: a small rounded badge containing a colored dot and
  a text label. Used to show the state of each WebSocket connection
  (connecting / connected / error). Default styles represent the unknown/idle
  state: muted text, faint dot, subtle border.
*/
.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px; /* large value = fully rounded pill shape */
  background: var(--panel);
  border: 1px solid var(--panel-border);
  font-size: 12px;
  color: var(--text-muted);
  transition: border-color .2s, color .2s; /* smooth when state changes */
}

/*
  Status dot inside the pill. Starts as a faint gray circle. The state
  modifier classes below change its color and add a glow halo.
*/
.pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-faint);
  transition: background .2s, box-shadow .2s;
}

/* Connected: bright text, stronger border, green dot with a soft glow. */
.pill.connected { color: var(--text); border-color: var(--panel-border-strong); }
.pill.connected .dot { background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }

/*
  Connecting: amber dot with a blinking animation to signal a pending
  connection that has not yet succeeded or failed.
*/
.pill.connecting .dot { background: #e0b34a; box-shadow: 0 0 0 3px rgba(224,179,74,0.18); animation: blink 1s infinite; }

/* Error: red dot to signal a failed or dropped connection. */
.pill.error .dot { background: var(--live); box-shadow: 0 0 0 3px var(--live-soft); }

/*
  Blink animation for the connecting state. The dot oscillates between full
  opacity and 35% opacity on a 1-second cycle, creating a "waiting" pulse.
*/
@keyframes blink { 50% { opacity: .35; } }

/* ---- Main layout ---- */

/*
  Two-column CSS grid. The left column is 320px fixed width (camera tile);
  the right column takes all remaining space (gallery). align-items: start
  prevents the shorter column from stretching to the height of the taller one;
  each panel is only as tall as its own content requires.
*/
.grid {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
  align-items: start;
}

/*
  Responsive breakpoint: on screens narrower than 820px (tablets, phones),
  drop to a single-column layout so the camera tile and gallery stack
  vertically. The camera tile appears first since it comes first in the DOM.
*/
@media (max-width: 820px) {
  .grid { grid-template-columns: 1fr; }
}

/*
  Panel / card base styles. Used for both the camera tile and the gallery.
  The semi-transparent fill + border over the dark background creates a
  frosted-glass card appearance.
*/
.panel {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  padding: 20px;
}

/* ---- Camera tile ---- */

/*
  The square stage area at the top of the camera panel. It shows an animated
  camera icon and a LIVE/PAUSED badge rather than an actual video feed (the
  MJPG stream is not piped through this dashboard; only control commands are).
  aspect-ratio: 1/1 keeps it square at whatever width the column provides.
  overflow: hidden clips the pulse animation rings to the rounded corners.
  The radial gradient gives the interior a subtle glow suggesting depth.
*/
.tile-stage {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: var(--radius-sm);
  background: radial-gradient(circle at 50% 40%, rgba(91,140,255,0.10), rgba(255,255,255,0.015));
  border: 1px solid var(--panel-border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  overflow: hidden;
}

/*
  Concentric rings that animate outward from the camera icon when the stream
  is LIVE. They are invisible by default (opacity: 0) and only become visible
  when the .live class is present on the stage. Three rings are used, each
  staggered in time via animation-delay, to create a continuous ripple effect
  rather than a single pulse.
*/
.ring {
  position: absolute;
  width: 92px; height: 92px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  opacity: 0;
}
.tile-stage.live .ring {
  opacity: 0.55;
  animation: pulse 2.2s ease-out infinite;
}
.tile-stage.live .ring:nth-child(2) { animation-delay: .7s; }  /* second ring starts 0.7s into the cycle */
.tile-stage.live .ring:nth-child(3) { animation-delay: 1.4s; } /* third ring starts 1.4s in */

/*
  Pulse animation: each ring starts small and red at the center, expands
  outward, and fades to invisible. The border-color switches from the default
  accent blue to live red during the active state so the rings match the LIVE
  badge color scheme.
*/
@keyframes pulse {
  0%   { transform: scale(0.6); opacity: 0.55; border-color: var(--live); }
  100% { transform: scale(1.9); opacity: 0;    border-color: var(--live); }
}

/*
  Circular container for the camera SVG icon at the center of the tile stage.
  z-index: 1 ensures it renders on top of the absolutely positioned rings.
  In the live state, a red box-shadow glow is added to reinforce the LIVE
  visual language.
*/
.cam-icon {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--panel);
  border: 1px solid var(--panel-border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}
.tile-stage.live .cam-icon { border-color: var(--live); box-shadow: 0 0 18px rgba(255,92,92,0.25); }

/*
  Badge in the top-left corner of the tile stage showing "LIVE" or "PAUSED".
  The semi-transparent dark background ensures legibility against any
  background content inside the stage. In the live state the badge turns red;
  in the paused state it is muted gray.
*/
.live-badge {
  position: absolute;
  top: 12px; left: 12px;
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--panel-border);
  border-radius: 999px;
  padding: 4px 9px;
  font-size: 11px;
  letter-spacing: 0.04em; /* slightly expanded spacing reads better at 11px */
  color: var(--text-muted);
}
.live-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); }
.tile-stage.live .live-badge { color: var(--live); border-color: rgba(255,92,92,0.3); }
.tile-stage.live .live-badge .dot { background: var(--live); box-shadow: 0 0 0 2px var(--live-soft); }

/*
  Static resolution and format text in the bottom-right corner of the tile
  stage. Styled with .mono (applied in JSX) to match a hardware readout look.
  Kept very faint so it does not compete with the status badge.
*/
.res-readout {
  position: absolute;
  bottom: 12px; right: 12px;
  font-size: 11px;
  color: var(--text-faint);
}

/*
  Control button layout below the tile stage.
  .actions is a vertical flex column; each child is either a single button
  (.ctl with flex: 1 filling the row) or a .row containing two buttons
  side by side (which use flex: 1 each to split the space equally).
*/
.actions { display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; gap: 8px; }

/*
  Control button base styles. flex: 1 means each button in a .row takes
  equal width. The 0.08s transform transition provides a fast press-down
  animation, while the longer 0.15s transitions smooth the hover state.
*/
button.ctl {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--panel-border-strong);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: transform .08s, background .15s, border-color .15s;
}
button.ctl:hover { background: rgba(255,255,255,0.07); border-color: var(--panel-border-strong); }
button.ctl:active { transform: scale(0.97); } /* subtle press-down feedback on click */

/* Primary variant: the "Take snapshot" button. Solid accent blue fill. */
button.ctl.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.ctl.primary:hover { background: #6f99ff; } /* slightly lighter blue on hover */

/* Stop variant: red text and border to signal a destructive/halting action. */
button.ctl.stop { color: var(--live); border-color: rgba(255,92,92,0.3); }
button.ctl.stop:hover { background: var(--live-soft); }

/*
  Disabled state: faded opacity and no interactive feedback. Used to prevent
  Start when already live, or Stop when already paused. This is purely a UI
  hint; the capture app handles duplicate commands gracefully on its own.
*/
button.ctl:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/*
  Count selector <select> next to the Multi-snapshot button. Styled to match
  the dark panel aesthetic instead of the default browser form styling. Fixed
  width (56px) prevents it from growing or shrinking with option text length.
*/
.count-select {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--panel-border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 0 10px;
  font-size: 13px;
  width: 56px;
}

/*
  Activity feed: a scrollable log of commands sent and their outcomes.
  max-height caps the feed so it does not push the panel to an unreasonable
  height; overflow-y: auto adds a scrollbar only when the log exceeds that height.
  The top border and extra top spacing visually separate the feed from the
  control buttons above it.
*/
.feed {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--panel-border);
  max-height: 170px;
  overflow-y: auto;
}
.feed-empty { color: var(--text-faint); font-size: 12px; }

/*
  Individual feed entry: a timestamp on the left and the message on the right,
  side by side. flex-shrink: 0 on the timestamp prevents it from collapsing
  if the message is long; the message wraps to a second line instead.
*/
.feed-item {
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 0;
}
.feed-item .t { color: var(--text-faint); flex-shrink: 0; }

/* ---- Gallery ---- */

/*
  Header row of the gallery panel: the title and photo count on the left, and
  a Refresh or Clear button on the right. align-items: baseline aligns the
  heading and the count label by their text baselines, which looks better
  than center-aligning elements of different sizes.
*/
.gallery-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}
.gallery-head h2 {
  font-size: 15px;
  font-weight: 600;
  margin: 0;
  color: var(--text);
}
/* Photo count shown inline after the heading, e.g. "Captures 42". */
.gallery-head .sub { font-size: 12px; color: var(--text-faint); margin-left: 8px; }

/*
  Ghost-style button used for Refresh and Clear. Transparent background, pill
  shape, muted text. Brightens on hover to signal interactivity. Also used
  by the HostSetting component for the editable hostname display.
*/
button.refresh {
  background: transparent;
  border: 1px solid var(--panel-border);
  color: var(--text-muted);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
button.refresh:hover { border-color: var(--panel-border-strong); color: var(--text); }

/*
  Search bar row: text input on the left taking all available space (flex: 1),
  Search button on the right at its natural width.
*/
.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.search-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--panel-border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 13px;
}
.search-input::placeholder { color: var(--text-faint); }
/* Highlight the border with the accent color when the input is focused. */
.search-input:focus { outline: none; border-color: var(--accent); }

/*
  Lightbox content wrapper: vertically stacks the enlarged image and the
  caption below it, both centered horizontally. max-width: 90vw prevents
  the content from running edge-to-edge on very wide screens.
*/
.lightbox-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 90vw;
}

/*
  Caption box beneath the lightbox image. Shown only when Claude produced a
  description for the photo (i.e. the vision Lambda ran on it and wrote a
  description to DynamoDB). The semi-transparent dark background ensures
  legibility against any overlay color.
*/
.lightbox-caption {
  background: rgba(10,14,20,0.75);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-top: 12px;
  max-width: 640px;
}
.lightbox-caption p {
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  margin: 0 0 10px;
}

/*
  Tag chips inside the lightbox caption: a wrapping row of small colored
  badges showing each object label the vision Lambda detected in this photo.
  The blue color scheme visually connects them to the accent brand color.
*/
.lightbox-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap; /* wrap to additional lines when there are many tags */
}
.tag-chip {
  background: var(--accent-soft);  /* translucent blue fill */
  color: var(--accent);             /* solid blue text */
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 11px;
}

/*
  Inline text input that replaces the hostname ghost button when the user
  clicks it to edit. The accent-colored border clearly distinguishes it as
  an active editable field rather than a static label.
*/
.host-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--accent);
  color: var(--text);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  width: 140px;
}
.host-input:focus { outline: none; }

/*
  Photo grid: auto-fill columns that are at minimum 150px wide and grow to fill
  available space. The number of columns adjusts automatically based on the
  panel's width, with no breakpoint media queries needed. On a typical laptop
  screen the gallery panel is wide enough for 4-5 columns.
*/
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

/*
  Individual photo card. aspect-ratio: 4/3 gives every cell a consistent
  landscape shape. overflow: hidden clips the image and the timestamp overlay
  to the rounded corners of the card.
*/
.photo-card {
  position: relative;
  aspect-ratio: 4 / 3;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--panel-border);
  cursor: pointer;
  background: rgba(255,255,255,0.02); /* subtle fill visible before the image loads */
}

/*
  Photo <img> inside each card. Starts at opacity: 0 and fades in once loaded.
  The .loaded class is added by the onLoad handler in the Gallery component.
  This approach avoids the flash of the browser's default broken-image icon
  that would appear if the src URL is still resolving. object-fit: cover crops
  the image to fill the card without distorting the aspect ratio.
*/
.photo-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity .35s, transform .25s;
}
.photo-card img.loaded { opacity: 1; }
.photo-card:hover img { transform: scale(1.04); } /* gentle zoom on hover */

/*
  Timestamp overlay pinned to the bottom of each photo card. The linear
  gradient from transparent at the top to semi-opaque black at the bottom
  ensures the white timestamp text remains legible regardless of the colors
  at the bottom edge of any particular photo.
*/
.photo-card .ts {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 6px 8px 5px;
  font-size: 10.5px;
  color: rgba(255,255,255,0.85);
  background: linear-gradient(transparent, rgba(0,0,0,0.55));
}

/*
  Empty state message shown in the gallery when there is nothing to display.
  Covers two cases: the bucket is empty (no captures yet), or a tag search
  returned no results. The component renders different text for each case.
*/
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
  font-size: 13px;
}

/* ---- Lightbox ---- */

/*
  Full-screen overlay for the enlarged photo view. position: fixed with
  inset: 0 (shorthand for top/right/bottom/left all = 0) covers the entire
  viewport regardless of scroll position. backdrop-filter: blur(6px) blurs
  everything behind the overlay, adding depth. z-index: 50 ensures it sits
  above all other page content. The fadeIn animation prevents a jarring
  instant appearance.
*/
.lightbox {
  position: fixed; inset: 0;
  background: rgba(6,8,12,0.86);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  animation: fadeIn .15s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/*
  The enlarged photo inside the lightbox. max-width and max-height constrain
  it to 90% of the viewport width and 70% of the viewport height so it never
  overflows the screen. The box-shadow creates a strong depth shadow that
  lifts the image visually off the dark overlay.
*/
.lightbox img {
  max-width: 90vw;
  max-height: 70vh;
  border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/*
  Close button: a small circle in the absolute top-right corner of the overlay.
  Clicking it (or clicking the overlay background) closes the lightbox.
*/
.lightbox-close {
  position: absolute;
  top: 22px; right: 26px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  color: var(--text);
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
}

/*
  Accessible keyboard focus outline for buttons and photo cards. :focus-visible
  applies only when the element receives focus via keyboard navigation, not on
  mouse clicks, so sighted mouse users do not see outlines after every click.
  outline-offset: 2px keeps the ring just outside the element's border.
*/
button:focus-visible, .photo-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/*
  Reduced-motion media query: respects the user's OS preference to minimize
  motion (commonly set by users with vestibular disorders or motion sensitivity).
  The pulse rings are kept visible at a low static opacity rather than animated.
  The connecting-state blink animation is disabled.
*/
@media (prefers-reduced-motion: reduce) {
  .tile-stage.live .ring { animation: none; opacity: .3; }
  .pill.connecting .dot { animation: none; }
}

/* ---- Camera-start confirmation dialog ---- */

.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(6,8,12,0.72);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 60;
  animation: fadeIn .15s ease-out;
}

.confirm-box {
  background: #13171f;
  border: 1px solid var(--panel-border-strong);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  max-width: 360px;
  width: 90vw;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}

.confirm-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin: 0 0 10px;
}

.confirm-body {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  margin: 0 0 22px;
}

.confirm-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
</style>
</head>
<body>

<!--
  Root mount point for the React application. This div starts empty; React
  fills it during the ReactDOM.createRoot(...).render(<App />) call at the
  bottom of the script. If JavaScript is disabled or fails to load, the user
  sees a blank page -- there is no server-side rendering fallback here.
-->
<div id="root"></div>

<!--
  React 18 core library, loaded as a UMD (Universal Module Definition) bundle
  from unpkg. UMD exposes React as a global variable (window.React) so it can
  be used without a module bundler like Webpack or Vite. The production build
  is minified and strips development-only warning code; use the .development.js
  variant if you need React's detailed runtime warnings while debugging.
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>

<!--
  ReactDOM: the package responsible for rendering React component trees into
  actual browser DOM nodes. Separated from the core React package since
  React 17 to allow React to target non-DOM environments (React Native, React
  Three Fiber, etc.) without bundling DOM-specific code.
-->
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<!--
  Babel standalone: a complete JavaScript compiler that runs in the browser.
  It converts JSX (the HTML-like syntax used inside React component return
  values) and modern JavaScript features into code that browsers can execute
  natively. In a production app with a build pipeline, Babel would run at
  build time and this tag would not exist. Here it allows writing JSX directly
  with no local tooling at all.
  The trade-off: the Babel standalone bundle is large (~1 MB) and transpilation
  happens on every page load. For a local single-user dashboard this is
  acceptable; it would not be for a public production site.
-->
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>

<!--
  The main application script.
  type="text/babel" -- tells Babel standalone to intercept and transpile this
  script before the browser executes it. Without this attribute the browser
  would try to parse the JSX directly and throw a syntax error.
  data-presets="react" -- activates the Babel React preset, which includes
  JSX transformation and the plugin set needed for React-style code.
-->
<script type="text/babel" data-presets="react">

// Destructure the hooks we need from the React global that was loaded above.
// React was attached to window.React by the UMD bundle. Destructuring here
// lets us write useState(...) instead of React.useState(...) throughout the file.
const { useState, useEffect, useRef, useCallback } = React;

// ---------------------------------------------------------------------------
// Host persistence helpers
// ---------------------------------------------------------------------------

// The localStorage key under which the camera hostname is saved. Using a
// namespaced key avoids collisions with other sites or apps that might use
// localStorage on the same origin (localhost:5000).
const STORAGE_KEY = "roost-host";

// Read the saved camera hostname from localStorage on page load. Returns
// "roost.lan" as the default if nothing has been saved yet (first visit)
// or if localStorage is unavailable (sandboxed iframe, private mode that
// blocks storage writes, etc.). The try/catch converts the storage access
// error into a graceful fallback rather than a page crash.
function loadSavedHost() {
  try {
    return localStorage.getItem(STORAGE_KEY) || "roost.lan";
  } catch (e) {
    return "roost.lan";
  }
}

// Persist the camera hostname to localStorage so it survives page reloads.
// Fails silently if localStorage is unavailable; the hostname will just
// reset to the default on the next load.
function saveHost(host) {
  try {
    localStorage.setItem(STORAGE_KEY, host);
  } catch (e) { /* ignore */ }
}

// ---------------------------------------------------------------------------
// useCameraSocket -- custom React hook
// ---------------------------------------------------------------------------
//
// Manages one WebSocket connection to a specific host:port combination.
// Handles the full lifecycle: initiating the connection, tracking its state,
// automatically retrying after disconnections, and providing a stable function
// to send JSON commands.
//
// This is a custom hook (a plain function whose name starts with "use") so
// it can call other hooks (useState, useEffect, useRef, useCallback) and
// be used by functional components like CameraTile and App.
//
// Parameters:
//   host (string): hostname or IP of the Roost device, e.g. "roost.lan"
//   port (number): WebSocket port to connect to (8080 or 8081)
//
// Returns an object with:
//   status (string): "connecting" | "connected" | "error"
//                    Drives the color of the status pill in the top bar.
//   send (function): call with a plain JS object to send it as JSON.
//                    Returns true if the socket was open and the send
//                    succeeded; false if the socket was not ready.
function useCameraSocket(host, port) {
  // Connection status. "connecting" is the initial state because we always
  // attempt a connection immediately when the hook mounts.
  const [status, setStatus] = useState("connecting");

  // A ref holding the active WebSocket instance. We use a ref rather than
  // state because replacing the WebSocket object should not trigger a re-render
  // by itself -- only the status state should do that. The ref also lets the
  // "send" callback read the current socket instance without listing the socket
  // as a dependency (which would force a new "send" reference on every reconnect).
  const wsRef = useRef(null);

  useEffect(() => {
    // "cancelled" is a coordination flag. When the useEffect cleanup runs
    // (because the component unmounted or host/port changed), we set this to
    // true to prevent any pending async callbacks or timer callbacks from
    // calling setStatus on a component that no longer exists, which would
    // produce a React warning.
    let cancelled = false;

    // Holds the return value of setTimeout so we can cancel the pending
    // reconnect timer in the cleanup function and avoid reconnecting after
    // the component unmounts.
    let retryTimer = null;

    // Inner function that creates and wires up a new WebSocket. Called once
    // immediately and then again recursively via setTimeout after disconnects.
    function connect() {
      if (cancelled) return; // already cleaned up; do not create new sockets
      setStatus("connecting");

      // Open a plain (non-TLS) WebSocket connection. ws:// is fine on a local
      // network; the Roost device and the browser are both inside the LAN.
      const ws = new WebSocket(`ws://${host}:${port}`);
      wsRef.current = ws; // store the socket in the ref for the "send" callback

      // onopen fires once the TCP connection and WebSocket handshake complete
      // successfully. Transition to the "connected" status.
      ws.onopen = () => !cancelled && setStatus("connected");

      // onerror fires on connection-level errors (refused, timeout, etc.).
      // Transition to the "error" status. onclose will also fire after an
      // error, so the retry logic lives in onclose rather than here.
      ws.onerror = () => !cancelled && setStatus("error");

      // onclose fires whenever the connection closes, whether cleanly or due
      // to an error. Schedule a reconnect attempt in 4 seconds. This means
      // the dashboard recovers automatically if the Roost device reboots or the network
      // temporarily drops.
      ws.onclose = () => {
        if (cancelled) return;
        setStatus("error");
        retryTimer = setTimeout(connect, 4000); // try again in 4 seconds
      };
    }

    connect(); // kick off the first connection attempt immediately

    // Cleanup function: runs when the component unmounts OR when host or port
    // changes (which causes React to re-run the effect with the new values).
    // Setting "cancelled" stops any in-flight callbacks from touching state.
    // Closing the socket prevents its onclose from scheduling a pointless
    // reconnect to the old host/port.
    return () => {
      cancelled = true;
      clearTimeout(retryTimer);
      wsRef.current?.close();
    };
  }, [host, port]); // re-run the entire effect whenever host or port changes

  // "send" serializes an object to JSON and sends it over the WebSocket.
  // useCallback with [] means the function reference is stable across re-renders
  // (never recreated unless the component unmounts). This avoids forcing
  // CameraTile to re-render every time App re-renders just because "send"
  // would otherwise be a new function reference.
  //
  // We read wsRef.current inside the callback to always get the most recently
  // established socket, even if a reconnect replaced the previous one since
  // this callback was created.
  const send = useCallback((obj) => {
    const ws = wsRef.current;
    // WebSocket.OPEN (value 1) means the connection is established and data
    // can be sent. Any other readyState (CONNECTING, CLOSING, CLOSED) means
    // the send would silently fail, so we check and report the failure instead.
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
      return true;  // caller can log "command sent successfully"
    }
    return false;   // caller can log "command failed -- socket not open"
  }, []);

  return { status, send };
}

// ---------------------------------------------------------------------------
// StatusPill component
// ---------------------------------------------------------------------------
//
// A small rounded badge in the top bar that shows the state of one WebSocket
// connection. The "status" value is applied as a CSS class modifier which
// drives the dot color and text brightness via the .pill.connected /
// .pill.connecting / .pill.error rules in the stylesheet above.
//
// Props:
//   label  (string): text displayed inside the pill, e.g. "control" or "stream"
//   status (string): "connecting" | "connected" | "error"
function StatusPill({ label, status }) {
  return (
    <div className={`pill ${status}`}>
      <span className="dot" />
      {label}
    </div>
  );
}

// ---------------------------------------------------------------------------
// HostSetting component
// ---------------------------------------------------------------------------
//
// Displays the current camera hostname as a ghost button. Clicking the button
// switches it to an inline text input for editing. Committing the new value
// (Enter key, or clicking away) calls onChange with the trimmed hostname.
// Pressing Escape cancels without saving.
//
// This "click to edit" pattern avoids a separate settings modal for a single
// configuration value.
//
// Props:
//   host     (string):   the currently configured hostname, e.g. "roost.lan"
//   onChange (function): called with the new hostname string when the user commits
function HostSetting({ host, onChange }) {
  // "editing" controls whether we show the button or the input field.
  const [editing, setEditing] = useState(false);

  // "draft" holds the text the user is typing. It is separate from the
  // committed "host" value so the user can type freely and back out without
  // the hostname changing until they explicitly commit.
  const [draft, setDraft] = useState(host);

  // Not editing: render the current hostname as a ghost button.
  // Clicking it seeds "draft" with the current hostname (so editing starts
  // from the current value rather than a blank field) and opens the input.
  if (!editing) {
    return (
      <button className="refresh" onClick={() => { setDraft(host); setEditing(true); }}>
        {host}
      </button>
    );
  }

  // Read the draft value, strip whitespace, and fall back to the default
  // hostname if the field was emptied before committing. Call onChange to
  // propagate the new hostname up to App, which will update state and trigger
  // new WebSocket connections to the new host.
  const commit = () => {
    const next = draft.trim() || "roost.lan"; // do not allow an empty hostname
    onChange(next);
    setEditing(false);
  };

  // Editing: render a styled text input in place of the button.
  // autoFocus puts the cursor in the field immediately when it appears.
  return (
    <input
      className="host-input mono"
      value={draft}
      autoFocus
      onChange={(e) => setDraft(e.target.value)}
      onBlur={commit}  // clicking away commits the value
      onKeyDown={(e) => {
        if (e.key === "Enter") commit();           // Enter commits
        if (e.key === "Escape") setEditing(false); // Escape cancels without saving
      }}
    />
  );
}

// ---------------------------------------------------------------------------
// CameraStartDialog component
// ---------------------------------------------------------------------------
//
// Modal dialog shown when the user tries to take a snapshot while the camera
// stream is not running. Lets them start the camera in one click or dismiss.
//
// Props:
//   onStart  (function): called when the user clicks "Start camera"
//   onCancel (function): called when the user clicks "No" or the overlay
function CameraStartDialog({ onStart, onCancel }) {
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-box" onClick={(e) => e.stopPropagation()}>
        <p className="confirm-title">Camera is not running</p>
        <p className="confirm-body">
          The camera must be started before you can take a snapshot.
          Would you like to start the camera?
        </p>
        <div className="confirm-actions">
          <button className="ctl" onClick={onCancel}>No</button>
          <button className="ctl primary" onClick={onStart}>Start camera</button>
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// CameraIcon component
// ---------------------------------------------------------------------------
//
// A simple inline SVG camera shape. Implemented as a React component rather
// than an <img> tag so it inherits "currentColor" from its CSS context and
// can be colored by setting the text color on a parent element. The two paths
// draw the camera body outline (with a viewfinder bump at the top) and the
// circular lens.
function CameraIcon() {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      {/* Camera body: a rectangle with rounded corners and a notch at the top
          formed by the diagonal lines in the path (the "L 1.3-2" shapes). */}
      <path d="M9 7l1.3-2h3.4L15 7h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3z"
        stroke="currentColor" strokeWidth="1.4" />
      {/* Lens: a circle centered inside the camera body. */}
      <circle cx="12" cy="13" r="3.2" stroke="currentColor" strokeWidth="1.4" />
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Utility: timeAgo
// ---------------------------------------------------------------------------
//
// Converts an ISO 8601 timestamp string into a human-readable relative time
// string. Used for the timestamp overlays on photo cards in the gallery.
//
// Examples: "45s ago", "12m ago", "3h ago", "2d ago"
//
// The function only looks at seconds/minutes/hours/days; sub-second precision
// is not needed here. The values are floored (Math.floor) rather than rounded
// so the result never jumps ahead of the actual age.
function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000; // age in seconds
  if (diff < 60)    return `${Math.floor(diff)}s ago`;
  if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

// ---------------------------------------------------------------------------
// Utility: nowHM
// ---------------------------------------------------------------------------
//
// Returns the current local time formatted as HH:MM:SS. Used for timestamps
// in the activity feed entries in the camera tile. These timestamps are
// ephemeral (only meaningful within the current browser session) so an ISO
// string with date and timezone would be overkill.
function nowHM() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

// ---------------------------------------------------------------------------
// CameraTile component
// ---------------------------------------------------------------------------
//
// The left panel of the dashboard. Renders a visual representation of the
// camera's stream state (LIVE / PAUSED) and provides buttons to send control
// commands over the two WebSocket connections. Maintains a small scrollable
// activity log of commands sent and their outcomes.
//
// Props:
//   control   (object): { status, send } from useCameraSocket(host, 8080)
//                       Port 8080 is the camera control socket. Commands:
//                         {"command": "snapshot"}
//                         {"command": "multisnapshot", "count": N}
//   streamCtl (object): { status, send } from useCameraSocket(host, 8081)
//                       Port 8081 is the stream control socket. Commands:
//                         {"command": "start_camera"}
//                         {"command": "stop_camera"}
function CameraTile({ control, streamCtl }) {
  // Tracks the assumed stream state. Starts "true" (live) because the capture
  // app typically starts streaming automatically on boot. This is optimistic:
  // we toggle it based on whether the command socket accepted the command, not
  // based on actual confirmation from the capture app.
  const [live, setLive] = useState(true);

  // The number of frames to request in a multi-snapshot burst. Mirrors the
  // value of the count <select> dropdown. Default is 3 frames.
  const [multiCount, setMultiCount] = useState(3);

  // The activity feed: an array of { t: "HH:MM:SS", msg: "..." } entries
  // shown in the scrollable log below the buttons. New entries are prepended
  // (most recent at the top) and the array is capped at 12 to prevent the
  // feed from growing unboundedly.
  const [feed, setFeed] = useState([]);

  // Controls whether the "camera not running" dialog is visible.
  const [showDialog, setShowDialog] = useState(false);

  // Prepend a timestamped message to the activity feed. useCallback with an
  // empty dependency array gives this function a stable reference so it can
  // be called from the command handlers below without being a dependency of
  // those callbacks.
  const log = useCallback((msg) => {
    setFeed((f) => [{ t: nowHM(), msg }, ...f].slice(0, 12));
  }, []);

  // Send a single snapshot command to the camera control socket (port 8080).
  // If the stream is not running, show the confirmation dialog instead.
  const sendSnapshot = () => {
    if (!live) { setShowDialog(true); return; }
    const ok = control.send({ command: "snapshot" });
    log(ok ? "Snapshot requested" : "Snapshot failed: control socket offline");
  };

  // Send a multi-snapshot command with the current frame count. multiCount
  // is a string from the <select> DOM element; Number() converts it to an
  // integer so the JSON payload has a numeric "count" field.
  const sendMulti = () => {
    if (!live) { setShowDialog(true); return; }
    const ok = control.send({ command: "multisnapshot", count: Number(multiCount) });
    log(ok ? `Multisnapshot requested (${multiCount} frames)` : "Multisnapshot failed: control socket offline");
  };

  // Send a start_camera command to the stream control socket (port 8081).
  // Only update the local "live" state if the send succeeded, so the UI
  // does not show LIVE when the socket was not actually open.
  const sendStart = () => {
    const ok = streamCtl.send({ command: "start_camera" });
    if (ok) { setLive(true); log("Stream started"); }
    else log("Start failed: stream socket offline");
  };

  // Send a stop_camera command to the stream control socket.
  const sendStop = () => {
    const ok = streamCtl.send({ command: "stop_camera" });
    if (ok) { setLive(false); log("Stream stopped"); }
    else log("Stop failed: stream socket offline");
  };

  return (
    <div className="panel">

      {showDialog && (
        <CameraStartDialog
          onStart={() => { sendStart(); setShowDialog(false); }}
          onCancel={() => setShowDialog(false)}
        />
      )}

      {/*
        Tile stage: the square visual area. The "live" CSS class activates the
        pulse ring animation and turns the LIVE badge and camera icon border red.
      */}
      <div className={`tile-stage ${live ? "live" : ""}`}>
        {/*
          Three absolutely positioned rings. In the live state, each one plays
          the "pulse" CSS animation with a 0.7s stagger between them, creating
          a continuous ripple effect emanating from the camera icon.
        */}
        <span className="ring" /><span className="ring" /><span className="ring" />

        {/* Circular container for the camera SVG. z-index: 1 keeps it on top of the rings. */}
        <div className="cam-icon"><CameraIcon /></div>

        {/* Top-left status badge. Text switches between "LIVE" and "PAUSED". */}
        <div className="live-badge"><span className="dot" />{live ? "LIVE" : "PAUSED"}</div>

        {/* Static informational text in the bottom-right corner. */}
        <div className="res-readout mono">3840×2160 · MJPG</div>
      </div>

      {/* Control buttons section. */}
      <div className="actions">

        {/* Primary action: single snapshot. Full-width, accent blue fill. */}
        <button className="ctl primary" onClick={sendSnapshot}>Take snapshot</button>

        {/* Multi-snapshot row: the button and the count dropdown side by side. */}
        <div className="row">
          <button className="ctl" onClick={sendMulti}>Multi-snapshot</button>
          {/*
            Frame count selector. Options are a burst size list.
            The value is a string from the DOM; Number() is called on it in
            sendMulti before it goes into the JSON payload.
          */}
          <select className="count-select" value={multiCount} onChange={(e) => setMultiCount(e.target.value)}>
            {[2, 3, 5, 10, 15].map((n) => <option key={n} value={n}>{n}</option>)}
          </select>
        </div>

        {/*
          Start/Stop row. Each button is disabled in the state where it would
          be a no-op: Start is disabled when already live, Stop when already
          paused. This is a UI hint only; the capture app handles duplicate
          commands without breaking.
        */}
        <div className="row">
          <button className="ctl" onClick={sendStart} disabled={live}>Start</button>
          <button className="ctl stop" onClick={sendStop} disabled={!live}>Stop</button>
        </div>
      </div>

      {/*
        Activity feed. Renders a placeholder message until the first command
        is sent, then shows up to 12 timestamped log entries newest-first.
      */}
      <div className="feed">
        {feed.length === 0
          ? <div className="feed-empty">No activity yet. Commands you send will show up here.</div>
          : feed.map((item, i) => (
              <div className="feed-item" key={i}>
                <span className="t mono">{item.t}</span>
                <span>{item.msg}</span>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Gallery component
// ---------------------------------------------------------------------------
//
// The right panel of the dashboard. Fetches and displays the most recent
// photos from the Flask backend. Auto-refreshes every 10 seconds in normal
// mode. Supports tag-based search that queries the DynamoDB index populated
// by the vision Lambda. Clicking any photo opens a lightbox with the enlarged
// image, Claude's natural-language description, and the full list of detected
// object labels.
function Gallery() {
  // The current array of photo objects returned by the API. null means the
  // initial load has not completed yet (show "Loading..."). An empty array
  // means the response arrived but contained no photos (show the empty state).
  // A non-empty array renders the photo grid.
  const [photos, setPhotos] = useState(null);

  // Tracks which photo keys have fired their <img> onLoad event so we can
  // apply the .loaded CSS class (which fades the image in). Stored as a plain
  // object used as a set: { "some-key.jpg": true, ... }.
  const [loadedKeys, setLoadedKeys] = useState({});

  // The photo object currently displayed in the lightbox, or null when the
  // lightbox is closed. The full photo object is kept here because the
  // lightbox needs the presigned URL, the description, and the tags.
  const [selected, setSelected] = useState(null);

  // The controlled value of the search text input.
  const [searchInput, setSearchInput] = useState("");

  // The tag currently being searched. Non-empty means we are in search mode:
  // the gallery shows search results, the header shows the tag in quotes, and
  // the auto-refresh interval is paused.
  const [activeTag, setActiveTag] = useState("");

  // Fetch the most recent photos from /api/photos and update the photos state.
  // useCallback with [] means this function reference is stable and safe to
  // pass to setInterval without causing the effect to repeatedly restart.
  const fetchPhotos = useCallback(async () => {
    try {
      const res = await fetch("/api/photos");
      const data = await res.json();
      setPhotos(data.photos || []);
    } catch (e) {
      // Network error or JSON parse failure: render an empty gallery rather
      // than leaving the loading spinner displayed indefinitely.
      setPhotos([]);
    }
  }, []);

  // Fetch photos matching a tag from /api/search?tag=<tag>.
  // Resets photos to null first so the UI shows "Loading..." while the
  // request is in flight, rather than keeping stale results visible.
  const fetchSearch = useCallback(async (tag) => {
    setPhotos(null);
    try {
      const res = await fetch(`/api/search?tag=${encodeURIComponent(tag)}`);
      const data = await res.json();
      setPhotos(data.photos || []);
    } catch (e) {
      setPhotos([]);
    }
  }, []);

  // Auto-refresh effect. Runs when the component mounts and whenever the
  // "activeTag" value changes (entering or leaving search mode).
  //
  // In normal mode (no activeTag): fetches immediately, then sets up a 10-second
  // polling interval. The cleanup function (returned from the effect) clears
  // the interval when the component unmounts or when we enter search mode.
  //
  // In search mode (activeTag is set): returns early without setting up any
  // interval, so the search results remain stable until the user clears the
  // search manually.
  useEffect(() => {
    if (activeTag) return; // search mode: do not auto-refresh
    fetchPhotos();                              // fetch immediately on mount
    const id = setInterval(fetchPhotos, 10000); // then every 10 seconds
    return () => clearInterval(id);             // stop when unmounting or changing modes
  }, [fetchPhotos, activeTag]);

  // Handle the search form submission. Prevents the default browser form
  // behavior (page navigation), validates the input, and kicks off a tag search.
  const runSearch = (e) => {
    e.preventDefault(); // do not let the browser reload the page on form submit
    const tag = searchInput.trim().toLowerCase();
    if (!tag) return; // ignore submissions with an empty field
    setActiveTag(tag);
    fetchSearch(tag);
  };

  // Exit search mode: reset the activeTag and searchInput, and immediately
  // fetch the default recent-photos view.
  const clearSearch = () => {
    setActiveTag("");
    setSearchInput("");
    fetchPhotos();
  };

  return (
    <div className="panel">

      {/*
        Gallery header: title on the left with a photo count badge, and a
        context-sensitive action button on the right (Refresh in default mode,
        Clear in search mode).
      */}
      <div className="gallery-head">
        <h2>
          {/* In search mode, show the tag in quotes. Otherwise show "Captures". */}
          {activeTag ? `"${activeTag}"` : "Captures"}
          {/*
            Photo count badge. Only rendered once photos is non-null (i.e.
            after the first API response arrives). Shows 0 for empty results.
          */}
          {photos && <span className="sub">{photos.length}</span>}
        </h2>
        {activeTag
          ? <button className="refresh" onClick={clearSearch}>Clear</button>
          : <button className="refresh" onClick={fetchPhotos}>Refresh</button>
        }
      </div>

      {/*
        Search form. Using a <form> with onSubmit means the user can press
        Enter to submit rather than having to click the Search button. The
        encodeURIComponent call in fetchSearch ensures special characters in
        the tag are safely encoded in the URL.
      */}
      <form className="search-row" onSubmit={runSearch}>
        <input
          className="search-input mono"
          placeholder="Search by what's in the photo (e.g. dog, car, package)"
          value={searchInput}
          onChange={(e) => setSearchInput(e.target.value)}
        />
        <button className="ctl" type="submit">Search</button>
      </form>

      {/* Loading state: null means the API response has not yet arrived. */}
      {photos === null && <div className="empty-state">Loading…</div>}

      {/* Empty result from a tag search: the tag index had no matching photos. */}
      {photos !== null && photos.length === 0 && activeTag && (
        <div className="empty-state">No photos tagged "{activeTag}" yet.</div>
      )}

      {/* Empty gallery: the S3 bucket has no objects (no snapshots taken yet). */}
      {photos !== null && photos.length === 0 && !activeTag && (
        <div className="empty-state">No captures yet. Send a snapshot to see it appear here.</div>
      )}

      {/*
        Photo grid. Rendered only when there is at least one photo to show.
        Each card is a clickable tile with a lazy-loaded image and a relative
        timestamp overlay. The tabIndex={0} makes the card focusable via
        keyboard Tab navigation (though a full a11y implementation would also
        need an onKeyDown to handle Enter/Space).
      */}
      {photos && photos.length > 0 && (
        <div className="photo-grid">
          {photos.map((p) => (
            <div
              className="photo-card"
              key={p.key}
              onClick={() => setSelected(p)} // open lightbox for this photo
              tabIndex={0}
            >
              <img
                src={p.url}
                // The .loaded class triggers the CSS opacity fade-in transition.
                // Without it, the image starts at opacity: 0 and is invisible.
                className={loadedKeys[p.key] ? "loaded" : ""}
                onLoad={() => setLoadedKeys((m) => ({ ...m, [p.key]: true }))}
                loading="lazy"  // browser defers loading until the card is near the viewport
                alt={p.key}
              />
              {/* Relative timestamp overlay, e.g. "3m ago". */}
              <div className="ts mono">{timeAgo(p.lastModified)}</div>
            </div>
          ))}
        </div>
      )}

      {/*
        Lightbox. Rendered as a fixed full-screen overlay when "selected" is
        non-null. Clicking the dark overlay background sets "selected" to null
        and closes it. The inner .lightbox-content div calls stopPropagation
        so clicks on the image or caption do not bubble up to the overlay and
        accidentally close the lightbox.

        The caption section (description + tags) is conditional: it only renders
        when the photo object has a "description" field, which is only present
        for photos returned by /api/search (the search route fetches the full
        DynamoDB IMAGE record including the description). Photos from /api/photos
        (the recent gallery) do not go through DynamoDB and will not have
        descriptions, so no caption box appears for them.
      */}
      {selected && (
        <div className="lightbox" onClick={() => setSelected(null)}>
          <button className="lightbox-close" onClick={() => setSelected(null)}>✕</button>
          <div className="lightbox-content" onClick={(e) => e.stopPropagation()}>
            <img src={selected.url} alt={selected.key} />
            {selected.description && (
              <div className="lightbox-caption">
                {/* Claude's natural-language description of what is in the photo. */}
                <p>{selected.description}</p>
                {/* All object labels detected by the vision Lambda, shown as chips. */}
                {selected.tags && selected.tags.length > 0 && (
                  <div className="lightbox-tags">
                    {selected.tags.map((t) => (
                      <span className="tag-chip mono" key={t}>{t}</span>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// App component -- the root of the React component tree
// ---------------------------------------------------------------------------
//
// Owns the camera hostname and creates the two WebSocket connections that are
// shared across the UI. Renders the top bar (brand, host setting, connection
// pills) and the main two-column grid (camera tile, gallery).
function App() {
  // The Roost device's hostname. Initialized lazily: passing a function to
  // useState means React calls it once at mount rather than calling it on
  // every render. loadSavedHost reads from localStorage so the last-used
  // hostname persists across page reloads.
  const [host, setHost] = useState(loadSavedHost);

  // WebSocket connection to the camera control port.
  // This socket accepts commands like "snapshot" and "multisnapshot".
  const control = useCameraSocket(host, 8080);

  // WebSocket connection to the stream control port.
  // This socket accepts "start_camera" and "stop_camera" commands.
  const streamCtl = useCameraSocket(host, 8081);

  // Called by HostSetting when the user commits a new hostname. Updates both
  // the React state (which re-renders the component and triggers new WebSocket
  // connections via useCameraSocket's useEffect) and localStorage (persistence).
  const updateHost = (next) => {
    setHost(next);
    saveHost(next);
  };

  return (
    <div className="app">

      {/* Top bar: brand on the left, connection status on the right. */}
      <div className="topbar">
        <div className="brand">
          <span className="brand-dot" />
          <h1 className="display">roost</h1>
        </div>
        <div className="pills">
          {/*
            HostSetting renders as a ghost button showing the current hostname.
            Clicking it opens an inline text input. Committing calls updateHost,
            which changes the host state and causes useCameraSocket to reconnect
            both WebSockets to the new address.
          */}
          <HostSetting host={host} onChange={updateHost} />
          {/* Status pill for the camera control socket (port 8080). */}
          <StatusPill label="control" status={control.status} />
          {/* Status pill for the stream control socket (port 8081). */}
          <StatusPill label="stream" status={streamCtl.status} />
        </div>
      </div>

      {/* Two-column main layout: camera tile on the left, gallery on the right. */}
      <div className="grid">
        {/*
          Pass both WebSocket hook results to CameraTile so it can send
          commands and read connection status for button disabled states.
        */}
        <CameraTile control={control} streamCtl={streamCtl} />
        {/*
          Gallery manages its own data fetching (polling /api/photos,
          querying /api/search) and does not need the WebSocket connections.
        */}
        <Gallery />
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Mount the application
// ---------------------------------------------------------------------------

// ReactDOM.createRoot is the React 18 API for creating a root render container.
// It replaces the older ReactDOM.render() call. Targeting the <div id="root">
// element defined at the top of the <body>.
//
// .render(<App />) starts the first render cycle. React builds a virtual DOM
// tree from the App component and its children, diffs it against the (empty)
// real DOM, and applies the minimum set of changes to make them match.
//
// createRoot enables React 18's concurrent rendering features: automatic state
// batching across async boundaries, the useTransition and useDeferredValue hooks,
// and Suspense improvements. None of those are explicitly used here, but using
// createRoot keeps the codebase on the modern API.
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>

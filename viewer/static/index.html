<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>picamera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: rgba(255,255,255,0.035);
    --panel-border: rgba(255,255,255,0.08);
    --panel-border-strong: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text-muted: #8a92a6;
    --text-faint: #565d70;
    --accent: #5b8cff;
    --accent-soft: rgba(91,140,255,0.16);
    --live: #ff5c5c;
    --live-soft: rgba(255,92,92,0.18);
    --ok: #34d399;
    --ok-soft: rgba(52,211,153,0.16);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(91,140,255,0.10), transparent),
                var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  a, button { font-family: inherit; }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 24px 64px;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .brand h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .pills {
    display: flex;
    gap: 8px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    font-size: 12px;
    color: var(--text-muted);
    transition: border-color .2s, color .2s;
  }

  .pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background .2s, box-shadow .2s;
  }

  .pill.connected { color: var(--text); border-color: var(--panel-border-strong); }
  .pill.connected .dot { background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }
  .pill.connecting .dot { background: #e0b34a; box-shadow: 0 0 0 3px rgba(224,179,74,0.18); animation: blink 1s infinite; }
  .pill.error .dot { background: var(--live); box-shadow: 0 0 0 3px var(--live-soft); }

  @keyframes blink { 50% { opacity: .35; } }

  /* ---- Layout ---- */
  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 820px) {
    .grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 20px;
  }

  /* ---- Camera tile ---- */
  .tile-stage {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius-sm);
    background: radial-gradient(circle at 50% 40%, rgba(91,140,255,0.10), rgba(255,255,255,0.015));
    border: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .ring {
    position: absolute;
    width: 92px; height: 92px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
  }
  .tile-stage.live .ring {
    opacity: 0.55;
    animation: pulse 2.2s ease-out infinite;
  }
  .tile-stage.live .ring:nth-child(2) { animation-delay: .7s; }
  .tile-stage.live .ring:nth-child(3) { animation-delay: 1.4s; }

  @keyframes pulse {
    0%   { transform: scale(0.6); opacity: 0.55; border-color: var(--live); }
    100% { transform: scale(1.9); opacity: 0; border-color: var(--live); }
  }

  .cam-icon {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--panel);
    border: 1px solid var(--panel-border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .tile-stage.live .cam-icon { border-color: var(--live); box-shadow: 0 0 18px rgba(255,92,92,0.25); }

  .live-badge {
    position: absolute;
    top: 12px; left: 12px;
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--text-muted);
  }
  .live-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); }
  .tile-stage.live .live-badge { color: var(--live); border-color: rgba(255,92,92,0.3); }
  .tile-stage.live .live-badge .dot { background: var(--live); box-shadow: 0 0 0 2px var(--live-soft); }

  .res-readout {
    position: absolute;
    bottom: 12px; right: 12px;
    font-size: 11px;
    color: var(--text-faint);
  }

  .actions { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 8px; }

  button.ctl {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-border-strong);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: transform .08s, background .15s, border-color .15s;
  }
  button.ctl:hover { background: rgba(255,255,255,0.07); border-color: var(--panel-border-strong); }
  button.ctl:active { transform: scale(0.97); }
  button.ctl.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.ctl.primary:hover { background: #6f99ff; }
  button.ctl.stop { color: var(--live); border-color: rgba(255,92,92,0.3); }
  button.ctl.stop:hover { background: var(--live-soft); }
  button.ctl:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .count-select {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 0 10px;
    font-size: 13px;
    width: 56px;
  }

  .feed {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--panel-border);
    max-height: 170px;
    overflow-y: auto;
  }
  .feed-empty { color: var(--text-faint); font-size: 12px; }
  .feed-item {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 0;
  }
  .feed-item .t { color: var(--text-faint); flex-shrink: 0; }

  /* ---- Gallery ---- */
  .gallery-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .gallery-head h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--text);
  }
  .gallery-head .sub { font-size: 12px; color: var(--text-faint); margin-left: 8px; }

  button.refresh {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--text-muted);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  button.refresh:hover { border-color: var(--panel-border-strong); color: var(--text); }

  .host-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--accent);
    color: var(--text);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    width: 140px;
  }
  .host-input:focus { outline: none; }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .photo-card {
    position: relative;
    aspect-ratio: 4 / 3;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--panel-border);
    cursor: pointer;
    background: rgba(255,255,255,0.02);
  }
  .photo-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity .35s, transform .25s;
  }
  .photo-card img.loaded { opacity: 1; }
  .photo-card:hover img { transform: scale(1.04); }
  .photo-card .ts {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 6px 8px 5px;
    font-size: 10.5px;
    color: rgba(255,255,255,0.85);
    background: linear-gradient(transparent, rgba(0,0,0,0.55));
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
    font-size: 13px;
  }

  /* ---- Lightbox ---- */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(6,8,12,0.86);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    animation: fadeIn .15s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lightbox img {
    max-width: 90vw;
    max-height: 86vh;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 22px; right: 26px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
  }

  /* a11y */
  button:focus-visible, .photo-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    .tile-stage.live .ring { animation: none; opacity: .3; }
    .pill.connecting .dot { animation: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = "picamera-host";
function loadSavedHost() {
  try {
    return localStorage.getItem(STORAGE_KEY) || "picamera.lan";
  } catch (e) {
    return "picamera.lan";
  }
}
function saveHost(host) {
  try {
    localStorage.setItem(STORAGE_KEY, host);
  } catch (e) { /* ignore */ }
}

function useCameraSocket(host, port) {
  const [status, setStatus] = useState("connecting"); // connecting | connected | error
  const wsRef = useRef(null);

  useEffect(() => {
    let cancelled = false;
    let retryTimer = null;

    function connect() {
      if (cancelled) return;
      setStatus("connecting");
      const ws = new WebSocket(`ws://${host}:${port}`);
      wsRef.current = ws;

      ws.onopen = () => !cancelled && setStatus("connected");
      ws.onerror = () => !cancelled && setStatus("error");
      ws.onclose = () => {
        if (cancelled) return;
        setStatus("error");
        retryTimer = setTimeout(connect, 4000);
      };
    }

    connect();
    return () => {
      cancelled = true;
      clearTimeout(retryTimer);
      wsRef.current?.close();
    };
  }, [host, port]);

  const send = useCallback((obj) => {
    const ws = wsRef.current;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
      return true;
    }
    return false;
  }, []);

  return { status, send };
}

function StatusPill({ label, status }) {
  return (
    <div className={`pill ${status}`}>
      <span className="dot" />
      {label}
    </div>
  );
}

function HostSetting({ host, onChange }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(host);

  if (!editing) {
    return (
      <button className="refresh" onClick={() => { setDraft(host); setEditing(true); }}>
        {host}
      </button>
    );
  }

  const commit = () => {
    const next = draft.trim() || "picamera.lan";
    onChange(next);
    setEditing(false);
  };

  return (
    <input
      className="host-input mono"
      value={draft}
      autoFocus
      onChange={(e) => setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") setEditing(false); }}
    />
  );
}

function CameraIcon() {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M9 7l1.3-2h3.4L15 7h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3z"
        stroke="currentColor" strokeWidth="1.4" />
      <circle cx="12" cy="13" r="3.2" stroke="currentColor" strokeWidth="1.4" />
    </svg>
  );
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}

function nowHM() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function CameraTile({ control, streamCtl }) {
  const [live, setLive] = useState(true);
  const [multiCount, setMultiCount] = useState(3);
  const [feed, setFeed] = useState([]);

  const log = useCallback((msg) => {
    setFeed((f) => [{ t: nowHM(), msg }, ...f].slice(0, 12));
  }, []);

  const sendSnapshot = () => {
    const ok = control.send({ command: "snapshot" });
    log(ok ? "Snapshot requested" : "Snapshot failed — control socket offline");
  };

  const sendMulti = () => {
    const ok = control.send({ command: "multisnapshot", count: Number(multiCount) });
    log(ok ? `Multisnapshot requested (${multiCount} frames)` : "Multisnapshot failed — control socket offline");
  };

  const sendStart = () => {
    const ok = streamCtl.send({ command: "start_camera" });
    if (ok) { setLive(true); log("Stream started"); }
    else log("Start failed — stream socket offline");
  };

  const sendStop = () => {
    const ok = streamCtl.send({ command: "stop_camera" });
    if (ok) { setLive(false); log("Stream stopped"); }
    else log("Stop failed — stream socket offline");
  };

  return (
    <div className="panel">
      <div className={`tile-stage ${live ? "live" : ""}`}>
        <span className="ring" /><span className="ring" /><span className="ring" />
        <div className="cam-icon"><CameraIcon /></div>
        <div className="live-badge"><span className="dot" />{live ? "LIVE" : "PAUSED"}</div>
        <div className="res-readout mono">3840×2160 · MJPG</div>
      </div>

      <div className="actions">
        <button className="ctl primary" onClick={sendSnapshot}>Take snapshot</button>
        <div className="row">
          <button className="ctl" onClick={sendMulti}>Multi-snapshot</button>
          <select className="count-select" value={multiCount} onChange={(e) => setMultiCount(e.target.value)}>
            {[2, 3, 5, 10, 15].map((n) => <option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div className="row">
          <button className="ctl" onClick={sendStart} disabled={live}>Start</button>
          <button className="ctl stop" onClick={sendStop} disabled={!live}>Stop</button>
        </div>
      </div>

      <div className="feed">
        {feed.length === 0
          ? <div className="feed-empty">No activity yet — commands you send will show up here.</div>
          : feed.map((item, i) => (
              <div className="feed-item" key={i}>
                <span className="t mono">{item.t}</span>
                <span>{item.msg}</span>
              </div>
            ))
        }
      </div>
    </div>
  );
}

function Gallery() {
  const [photos, setPhotos] = useState(null);
  const [loadedKeys, setLoadedKeys] = useState({});
  const [selected, setSelected] = useState(null);

  const fetchPhotos = useCallback(async () => {
    try {
      const res = await fetch("/api/photos");
      const data = await res.json();
      setPhotos(data.photos || []);
    } catch (e) {
      setPhotos([]);
    }
  }, []);

  useEffect(() => {
    fetchPhotos();
    const id = setInterval(fetchPhotos, 10000);
    return () => clearInterval(id);
  }, [fetchPhotos]);

  return (
    <div className="panel">
      <div className="gallery-head">
        <h2>Captures{photos && <span className="sub">{photos.length}</span>}</h2>
        <button className="refresh" onClick={fetchPhotos}>Refresh</button>
      </div>

      {photos === null && <div className="empty-state">Loading…</div>}
      {photos !== null && photos.length === 0 && (
        <div className="empty-state">No captures yet — send a snapshot to see it appear here.</div>
      )}

      {photos && photos.length > 0 && (
        <div className="photo-grid">
          {photos.map((p) => (
            <div className="photo-card" key={p.key} onClick={() => setSelected(p)} tabIndex={0}>
              <img
                src={p.url}
                className={loadedKeys[p.key] ? "loaded" : ""}
                onLoad={() => setLoadedKeys((m) => ({ ...m, [p.key]: true }))}
                loading="lazy"
                alt={p.key}
              />
              <div className="ts mono">{timeAgo(p.lastModified)}</div>
            </div>
          ))}
        </div>
      )}

      {selected && (
        <div className="lightbox" onClick={() => setSelected(null)}>
          <button className="lightbox-close" onClick={() => setSelected(null)}>✕</button>
          <img src={selected.url} alt={selected.key} onClick={(e) => e.stopPropagation()} />
        </div>
      )}
    </div>
  );
}

function App() {
  const [host, setHost] = useState(loadSavedHost);
  const control = useCameraSocket(host, 8080);
  const streamCtl = useCameraSocket(host, 8081);

  const updateHost = (next) => {
    setHost(next);
    saveHost(next);
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <span className="brand-dot" />
          <h1 className="display">picamera</h1>
        </div>
        <div className="pills">
          <HostSetting host={host} onChange={updateHost} />
          <StatusPill label="control" status={control.status} />
          <StatusPill label="stream" status={streamCtl.status} />
        </div>
      </div>

      <div className="grid">
        <CameraTile control={control} streamCtl={streamCtl} />
        <Gallery />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
